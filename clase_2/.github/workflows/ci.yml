name: CI
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch: {}        # permite desplegar docs manualmente

permissions:
  contents: read               # default mínimo para todos los jobs

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (non-blocking — hay deuda técnica preexistente)
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build

  backend-tests:
    name: Backend — integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: senoriales_test
          POSTGRES_PASSWORD: senoriales_test
          POSTGRES_DB: senoriales_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U senoriales_test -d senoriales_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Generate Prisma client
        run: npx dotenv -e .env.test -- prisma generate
      - name: Run test suite
        run: npm test

  docs-build:
    name: Docs — build MkDocs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Instalar MkDocs Material
        run: pip install mkdocs-material
      - name: Construir sitio (--strict para fallar ante enlaces rotos)
        run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  docs-deploy:
    name: Docs — deploy a GitHub Pages
    needs: docs-build
    if: github.event_name != 'pull_request'   # despliega en push y en manual, no en PRs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false               # no cortar un deploy de Pages a medias
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
