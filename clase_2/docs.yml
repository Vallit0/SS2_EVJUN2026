name: Publicar documentación (MkDocs)

# Publica la wiki MkDocs Material en GitHub Pages.
# Requisito una sola vez: en Settings → Pages, fijar "Source: GitHub Actions".
on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch: {}   # permite ejecutarlo manualmente desde cualquier rama

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola publicación a la vez; no cancelar un deploy en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Instalar MkDocs Material
        run: pip install mkdocs-material
      - name: Construir sitio
        run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
